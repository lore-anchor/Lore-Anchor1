name: AI Consensus Builder

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  schedule:
    - cron: '0 */6 * * *'  # 6時間ごとにチェック

permissions:
  contents: read
  issues: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  analyze-proposal:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'proposal')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Analyze proposal
        id: analyze
        run: |
          echo "Analyzing proposal #${{ github.event.issue.number }}"
          
          # 提案内容を取得
          ISSUE_BODY="${{ github.event.issue.body }}"
          
          # 関係チームを特定 (grepが見つからない場合でもエラーにならないように)
          TEAMS=$(echo "$ISSUE_BODY" | grep -oE '\[x\] .* Team' | sed 's/- \[x\] //' || echo "")
          
          echo "teams<<EOF" >> $GITHUB_OUTPUT
          echo "$TEAMS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Request team reviews
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const teams = `${{ steps.analyze.outputs.teams }}`.split('\n').filter(t => t);
            
            if (teams.length === 0) {
              console.log("No teams found to mention");
              return;
            }
            
            // 各チームにメンション
            const mentions = teams.map(t => `@${context.repo.owner}/${t.toLowerCase().replace(/ /g, '-')}`).join(' ');
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: `## 🏛️ 意思決定プロセス開始

この提案について、以下のチームのレビューを求めます:

${mentions}

**期限:** 72時間以内

### レビュー方法
このIssueにコメントしてください:
\`\`\`
Team: [チーム名]
Vote: [approve / reject / abstain]
Comments: [コメント]
\`\`\``
            });
            
            // ラベルを更新
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              labels: ['under-review']
            });

  check-consensus:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'under-review')
    permissions:
      issues: write
    
    steps:
      - name: Check votes
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            
            // コメントを取得
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number
            });
            
            // 投票をカウント
            const votes = {};
            comments.data.forEach(comment => {
              const body = comment.body;
              if (body.includes('Team:') && body.includes('Vote:')) {
                const team = body.match(/Team:\s*(.+)/)?.[1]?.trim();
                const vote = body.match(/Vote:\s*(.+)/)?.[1]?.trim();
                if (team && vote) {
                  votes[team] = vote;
                }
              }
            });
            
            // 合意判定
            const total = Object.keys(votes).length;
            const approves = Object.values(votes).filter(v => v === 'approve').length;
            const rejects = Object.values(votes).filter(v => v === 'reject').length;
            
            console.log(`Votes: ${approves} approve, ${rejects} reject, ${total - approves - rejects} abstain`);
            
            // 70%以上の賛成で承認
            const consensusReached = total > 0 && (approves / total) >= 0.7;
            
            core.setOutput('consensus', consensusReached);
            core.setOutput('vote_summary', `${approves} approve, ${rejects} reject`);
      
      - name: Update issue on consensus
        if: steps.check.outputs.consensus == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            
            // 承認コメント
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: `## ✅ 合意形成完了

この提案は**承認されました**。

**投票結果:** ${process.env.VOTE_SUMMARY}

次のステップ:
1. 実装Issueの作成
2. 担当チームのアサイン
3. スケジュール設定`
            });
            
            // ラベル更新
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              labels: ['approved']
            });
            
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue_number,
                name: 'under-review'
              });
            } catch (e) {
              console.log('Label under-review not found or already removed');
            }
        env:
          VOTE_SUMMARY: ${{ steps.check.outputs.vote_summary }}
